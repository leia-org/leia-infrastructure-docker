services:
  # DATABASE SERVICES
  mongodb-designer:
    restart: unless-stopped
    image: mongo:latest
    container_name: mongodb-designer
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    ports:
      - '${MONGO_PORT_DESIGNER}:27017'
    volumes:
      - mongo-designer:/data/db
    networks:
      - leia-designer-network

  redis:
    restart: unless-stopped
    image: redis:latest
    container_name: redis-designer
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis-data:/data
    networks:
      - leia-designer-network

  # BACKEND SERVICES
  designer-backend:
    restart: unless-stopped
    image: ghcr.io/leia-org/leia-designer-backend:latest
    container_name: designer-backend
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb-designer:27017/designer?authSource=admin
      - FRONTEND_URL=${DESIGNER_FRONTEND_URL}
      - NODE_ENV=${NODE_ENV}
      - PORT=80
      - JWT_SECRET=${JWT_SECRET}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - API_KEY=${API_KEY}
      - RUNNER_URL=${RUNNER_URL}
      - RUNNER_KEY=${RUNNER_KEY}
    depends_on:
      - mongodb-designer
    ports:
      - '${PORT_DESIGNER_BACKEND}:80'
    networks:
      - leia-designer-network

  runner:
    restart: unless-stopped
    image: ghcr.io/leia-org/leia-runner:latest
    container_name: runner-designer
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=${NODE_ENV}
      - PORT=80
      - RUNNER_KEY=${RUNNER_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EVALUATION_MODEL=${OPENAI_EVALUATION_MODEL:-gpt-4o}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-openai}
    depends_on:
      - redis
    ports:
      - '${PORT_RUNNER}:80'
    networks:
      - leia-designer-network

  # FRONTEND SERVICES
  designer-frontend:
    restart: unless-stopped
    image: ghcr.io/leia-org/leia-designer-frontend:latest
    container_name: designer-frontend
    environment:
      - PORT=3000
      - NODE_ENV=${NODE_ENV}
    ports:
      - '${PORT_DESIGNER_FRONTEND}:3000'
    networks:
      - leia-designer-network

volumes:
  mongo-designer:
  redis-data:

networks:
  leia-designer-network:
    driver: bridge
